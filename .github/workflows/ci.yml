name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Artifact sanity checks
        run: |
          test -f dist/manifest.json
          test -f dist/cosmetic-rules.json
          test -d dist/rules
          find dist/rules -maxdepth 1 -type f -name '*.json' | grep -q .
