<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZeroTrace Quick Controls</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <section class="popup-card popup-hero" aria-labelledby="popup-title">
        <div>
          <p class="eyebrow">ZeroTrace</p>
          <h1 id="popup-title">Quick controls</h1>
          <p id="popup-summary" class="popup-summary">Protection is active across your browsing session.</p>
          <p id="popup-host" class="popup-host">Current site: loading…</p>
        </div>
        <div id="popup-master-pill" class="popup-pill" data-state="on">Live</div>
      </section>

      <section class="popup-card" aria-labelledby="popup-live-title">
        <div class="section-heading">
          <div>
            <p class="panel-label">Your settings</p>
            <h2 id="popup-live-title">Protection toggles</h2>
          </div>
        </div>

        <div class="toggle-list">
          <label class="setting-row setting-row-primary" for="popup-enabled">
            <span class="setting-copy">
              <span class="setting-title">Protection</span>
              <span class="setting-description">Master switch—turns all blocking and cleanup on/off.</span>
            </span>
            <span class="toggle-wrap">
              <input id="popup-enabled" type="checkbox" />
              <span class="toggle-visual" aria-hidden="true"></span>
            </span>
          </label>

          <label class="setting-row" for="popup-network">
            <span class="setting-copy">
              <span class="setting-title">Network blocking</span>
              <span class="setting-description">Blocks ads and trackers before they load.</span>
            </span>
            <span class="toggle-wrap">
              <input id="popup-network" type="checkbox" />
              <span class="toggle-visual" aria-hidden="true"></span>
            </span>
          </label>

          <label class="setting-row" for="popup-cosmetic">
            <span class="setting-copy">
              <span class="setting-title">Cosmetic filtering</span>
              <span class="setting-description">Hides page clutter after load.</span>
            </span>
            <span class="toggle-wrap">
              <input id="popup-cosmetic" type="checkbox" />
              <span class="toggle-visual" aria-hidden="true"></span>
            </span>
          </label>

          <label class="setting-row" for="popup-badge">
            <span class="setting-copy">
              <span class="setting-title">Badge count</span>
              <span class="setting-description">Shows blocked totals on the toolbar icon.</span>
            </span>
            <span class="toggle-wrap">
              <input id="popup-badge" type="checkbox" />
              <span class="toggle-visual" aria-hidden="true"></span>
            </span>
          </label>
        </div>
      </section>

      <section class="popup-card" aria-labelledby="popup-site-title">
        <div class="section-heading">
          <div>
            <p class="panel-label">This site</p>
            <h2 id="popup-site-title">Site controls</h2>
          </div>
        </div>

        <div class="disabled-actions" aria-describedby="popup-site-note">
          <button type="button" id="popup-pause-host" class="ghost-button">Pause on this site</button>
          <button type="button" id="popup-whitelist-host" class="ghost-button">Skip this site</button>
        </div>

        <p id="popup-site-note" class="preview-note">Use these controls for this site across tabs.</p>
      </section>

      <div class="popup-footer">
        <button type="button" id="open-options-btn" class="footer-button">Open full settings</button>
        <p id="popup-status" class="status" aria-live="polite"></p>
      </div>
    </main>

    <script src="settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
